name: TikTok Daily Streak (Ubuntu)

on:
  schedule:
    - cron: "15 9 * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Create cookie file from secret
        env:
          COOKIE_DATA: ${{ secrets.COOKIE }}
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 - <<'PY'
          import os
          from pathlib import Path

          cookie = os.environ.get("COOKIE_DATA", "")
          if not cookie.strip():
              raise SystemExit("COOKIE secret is empty or missing")

          Path("cookie.txt").write_text(cookie, encoding="utf-8")
          print("cookie.txt created")
          print("cookie length:", len(cookie))
          PY

      - name: Create and Install Python virtual environment
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Run TikTok Bot Script
        run: |
          cd "$GITHUB_WORKSPACE"
          source venv/bin/activate
          python Program.py

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-debug-artifacts
          path: |
            *.log
            *.png