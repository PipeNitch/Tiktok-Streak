name: Ubuntu GUI

on:
  workflow_dispatch:

jobs:
  gui:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install desktop, VNC, noVNC, Chromium, and tools
        run: |
          sudo apt update
          sudo DEBIAN_FRONTEND=noninteractive apt install -y \
            xfce4 \
            xfce4-goodies \
            dbus-x11 \
            xterm \
            tigervnc-standalone-server \
            tigervnc-common \
            novnc \
            websockify \
            curl \
            wget \
            git \
            nano \
            python3 \
            python3-pip \
            python3-venv \
            unzip \
            chromium-browser \
            chromium-chromedriver

          chromium-browser --version || chromium --version || true
          chromedriver --version || true

      - name: Create cookie file from secret
        env:
          COOKIE_DATA: ${{ secrets.TIKTOK_COOKIE }}
        run: |
          cd "$GITHUB_WORKSPACE"

          if [ -n "$COOKIE_DATA" ]; then
            python3 - <<'PY'
          import os
          from pathlib import Path

          cookie = os.environ.get("COOKIE_DATA", "")
          Path("cookie.txt").write_text(cookie, encoding="utf-8")
          print("cookie.txt created")
          print("cookie length:", len(cookie))
          PY
          else
            echo "TIKTOK_COOKIE is empty or missing; skipped cookie.txt"
          fi

      - name: Create Python virtual environment
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install selenium
          fi

      - name: Configure VNC
        env:
          VNC_PASSWORD: ${{ secrets.VNC_PASSWORD }}
        run: |
          mkdir -p ~/.vnc

          if [ -z "$VNC_PASSWORD" ]; then
            echo "VNC_PASSWORD secret is missing"
            exit 1
          fi

          echo "$VNC_PASSWORD" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd

          cat > ~/.vnc/xstartup <<'EOF'
          #!/bin/sh
          unset SESSION_MANAGER
          unset DBUS_SESSION_BUS_ADDRESS

          [ -r "$HOME/.Xresources" ] && xrdb "$HOME/.Xresources"

          export XKL_XMODMAP_DISABLE=1
          export DESKTOP_SESSION=xfce
          export XDG_CURRENT_DESKTOP=XFCE
          export XDG_SESSION_DESKTOP=xfce

          dbus-launch --exit-with-session startxfce4
          EOF

          chmod +x ~/.vnc/xstartup
          cat ~/.vnc/xstartup

      - name: Start VNC desktop
        run: |
          vncserver -kill :1 || true
          rm -f /tmp/.X1-lock
          rm -rf /tmp/.X11-unix/X1

          vncserver :1 -geometry 1365x768 -depth 24 -localhost yes

          sleep 5
          vncserver -list

          echo "===== VNC log ====="
          cat ~/.vnc/*.log || true

      - name: Start noVNC
        run: |
          nohup websockify --web=/usr/share/novnc/ 6080 localhost:5901 > novnc.log 2>&1 &
          sleep 3

          echo "===== noVNC log ====="
          cat novnc.log || true

      - name: Install ngrok
        run: |
          curl -sSL "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz" -o ngrok.tgz
          tar -xzf ngrok.tgz
          sudo mv ngrok /usr/local/bin/ngrok
          rm ngrok.tgz
          ngrok version

      - name: Configure ngrok
        env:
          NGROK_TOKEN: ${{ secrets.NGROK_TOKEN }}
        run: |
          if [ -z "$NGROK_TOKEN" ]; then
            echo "NGROK_TOKEN secret is missing"
            exit 1
          fi

          ngrok config add-authtoken "$NGROK_TOKEN"

      - name: Start ngrok tunnel to GUI
        run: |
          echo "Starting GUI tunnel..."
          echo "Look for the ngrok public URL below."
          echo "Then open:"
          echo "https://YOUR_NGROK_URL/vnc.html"

          ngrok http 6080 --log=stdout